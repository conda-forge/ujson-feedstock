schema_version: 1

context:
  name: ujson
  version: "5.12.1"
  sha256: 5b7e96406c301a1366534479a7352ec40ec68bb327c0c119091635acd5925e35

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 5b7e96406c301a1366534479a7352ec40ec68bb327c0c119091635acd5925e35

build:
  number: 0
  skip: match(python, "<3.7")
  script: ${{ PYTHON }} -m pip install . -vv --no-build-isolation --no-deps

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
  host:
    - python
    - pip
    - setuptools >=42
    - setuptools_scm >=3.4
  run:
    - python

tests:
  - python:
      imports:
        - ujson
      pip_check: true

about:
  summary: Ultra fast JSON decoder and encoder written in C with Python bindings
  license: BSD-3-Clause
  license_file: LICENSE.txt
  homepage: https://github.com/ultrajson/ultrajson
  repository: https://github.com/ultrajson/ultrajson

extra:
  recipe-maintainers:
    - thewchan
    - kszucs
    - synapticarbors
